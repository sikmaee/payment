<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUXX PAY - Singularity AI</title>
    <!-- Core Stack -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        [v-cloak] { display: none; }
        :root {
            --neon-cyan: #22d3ee;
            --neon-purple: #a855f7;
            --neon-indigo: #6366f1;
        }

        body { 
            font-family: 'Space Grotesk', sans-serif; 
            background-color: #000;
            color: white;
            overflow-x: hidden;
            margin: 0;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #0a0a2e 0%, #000 100%);
        }

        /* Glassmorphism Singularity */
        .glass-panel {
            background: rgba(2, 6, 23, 0.7);
            backdrop-filter: blur(30px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .glass-panel:hover {
            border-color: rgba(34, 211, 238, 0.3);
            transform: translateY(-5px);
        }

        /* Cyber Button */
        .cyber-btn {
            position: relative;
            background: linear-gradient(135deg, var(--neon-indigo) 0%, var(--neon-purple) 100%);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .cyber-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.5s;
        }

        .cyber-btn:hover::before {
            left: 100%;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--neon-indigo); border-radius: 10px; }

        /* AI Message Styling */
        .ai-bubble {
            background: rgba(30, 41, 59, 0.5);
            border-left: 4px solid var(--neon-cyan);
            border-radius: 0 20px 20px 20px;
        }

        .user-bubble {
            background: linear-gradient(135deg, var(--neon-indigo) 0%, var(--neon-purple) 100%);
            border-radius: 20px 0 20px 20px;
        }
    </style>
</head>
<body class="selection:bg-cyan-500/30">

    <div id="canvas-container"></div>

    <div id="app" v-cloak class="max-w-4xl mx-auto min-h-screen p-6 pb-24 flex flex-col relative z-10">
        
        <!-- Header Section -->
        <header class="py-20 text-center animate-in fade-in duration-1000">
            <div class="relative inline-block group">
                <div class="absolute -inset-8 bg-cyan-500 blur-[80px] opacity-20 group-hover:opacity-40 transition-opacity"></div>
                <h1 class="text-8xl font-black italic tracking-tighter uppercase leading-none bg-clip-text text-transparent bg-gradient-to-b from-white via-slate-400 to-slate-800">
                    RUXX<span class="text-cyan-400">PAY</span>
                </h1>
            </div>
            <p class="text-[11px] font-black text-cyan-400 uppercase tracking-[1.5em] mt-6 opacity-80">Singularity Intelligence Layer</p>
        </header>

        <!-- Payment Infrastructure -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-10 mb-20">
            
            <!-- QRIS MODULE -->
            <section class="space-y-6 animate-in fade-in slide-in-from-left duration-700">
                <div class="flex items-center gap-3 px-4">
                    <div class="w-2 h-2 bg-cyan-400 rounded-full animate-ping"></div>
                    <h2 class="text-xs font-black uppercase tracking-widest text-slate-400">Satellite QRIS Uplink</h2>
                </div>
                
                <div class="glass-panel rounded-[3.5rem] p-10 text-center space-y-8">
                    <div class="relative inline-block bg-white p-5 rounded-[2.5rem] group cursor-pointer shadow-2xl overflow-hidden">
                        <div class="absolute inset-0 bg-cyan-500/10 opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                        <img :src="config.qrisUrl" alt="QRIS" class="w-64 h-64 object-contain rounded-xl transition-transform duration-700 group-hover:scale-105">
                    </div>
                    <button @click="downloadQR" class="w-full py-5 bg-white text-black rounded-2xl font-black text-[10px] uppercase tracking-[0.3em] flex items-center justify-center gap-3 hover:bg-cyan-50 transition-all active:scale-95 shadow-xl">
                        <i class="ph-bold ph-rocket-launch text-xl"></i>
                        Eject QR Asset
                    </button>
                </div>
            </section>

            <!-- DANA MODULE -->
            <section class="space-y-6 animate-in fade-in slide-in-from-right duration-700">
                <div class="flex items-center gap-3 px-4">
                    <div class="w-2 h-2 bg-purple-400 rounded-full animate-ping"></div>
                    <h2 class="text-xs font-black uppercase tracking-widest text-slate-400">Quantum DANA Node</h2>
                </div>

                <div class="glass-panel rounded-[3.5rem] p-10 space-y-12 relative overflow-hidden text-left">
                    <div class="space-y-4 relative z-10">
                        <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Target Endpoint</p>
                        <h3 class="text-4xl font-black tracking-widest text-cyan-400 leading-none">
                            {{ config.danaNumber }}
                        </h3>
                        <div class="pt-4 flex items-center gap-3">
                            <i class="ph-fill ph-user-circle text-2xl text-slate-500"></i>
                            <span class="text-[11px] font-black uppercase tracking-[0.2em] text-slate-200 italic">
                                A/N {{ config.danaName }}
                            </span>
                        </div>
                    </div>

                    <button @click="copy(config.danaNumber)" class="w-full py-5 cyber-btn text-white rounded-2xl font-black text-[10px] uppercase tracking-[0.3em] flex items-center justify-center gap-3 active:scale-95 shadow-lg shadow-indigo-600/30">
                        <i class="ph-bold ph-link-simple text-xl"></i>
                        Copy Link Node
                    </button>
                </div>
            </section>
        </div>

        <!-- AI SINGULARITY CENTER -->
        <section class="flex-1 flex flex-col space-y-8 animate-in fade-in slide-in-from-bottom duration-1000">
            <div class="flex items-center justify-between px-6">
                <div class="flex items-center gap-4">
                    <div class="relative w-12 h-12 flex items-center justify-center bg-indigo-600 rounded-2xl shadow-[0_0_30px_rgba(99,102,241,0.5)]">
                        <i class="ph-fill ph-robot text-3xl"></i>
                        <div class="absolute -top-1 -right-1 w-3 h-3 bg-green-500 rounded-full border-2 border-slate-900"></div>
                    </div>
                    <div>
                        <h2 class="text-lg font-black uppercase tracking-tighter leading-none italic">Singularity AI</h2>
                        <span class="text-[9px] font-bold text-slate-500 uppercase tracking-widest mt-1">Deep Learning Processor v2.5</span>
                    </div>
                </div>
            </div>

            <div class="glass-panel rounded-[3rem] flex-1 flex flex-col overflow-hidden min-h-[550px]">
                <!-- Chat Window -->
                <div ref="chatContainer" class="flex-1 overflow-y-auto p-10 space-y-8 scroll-smooth">
                    <div v-for="(msg, i) in chat.messages" :key="i" 
                        :class="msg.role === 'user' ? 'flex flex-row-reverse' : 'flex flex-row'"
                        class="animate-in fade-in zoom-in duration-300"
                    >
                        <div :class="msg.role === 'user' ? 'user-bubble' : 'ai-bubble text-slate-200'" 
                             class="max-w-[85%] px-8 py-5 shadow-2xl">
                            <p class="text-sm font-medium leading-relaxed italic tracking-wide">{{ msg.text }}</p>
                        </div>
                    </div>
                    <!-- Typing Indicator -->
                    <div v-if="chat.isTyping" class="flex flex-row">
                        <div class="ai-bubble px-8 py-5 flex items-center gap-2">
                            <span class="w-2 h-2 bg-cyan-400 rounded-full animate-bounce"></span>
                            <span class="w-2 h-2 bg-cyan-400 rounded-full animate-bounce" style="animation-delay: 0.2s"></span>
                            <span class="w-2 h-2 bg-cyan-400 rounded-full animate-bounce" style="animation-delay: 0.4s"></span>
                        </div>
                    </div>
                </div>

                <!-- Input Panel -->
                <div class="p-8 bg-black/40 border-t border-white/5 flex gap-5">
                    <input 
                        v-model="chat.userInput" 
                        @keyup.enter="sendMessage"
                        type="text" 
                        placeholder="Hubungi terminal pusat..." 
                        class="flex-1 bg-white/5 border border-white/10 rounded-2xl px-8 py-5 text-sm font-medium outline-none focus:border-cyan-500 focus:bg-white/10 transition-all placeholder:text-slate-700"
                    >
                    <button 
                        @click="sendMessage" 
                        :disabled="!chat.userInput || chat.isTyping"
                        class="w-16 h-16 bg-cyan-600 text-white rounded-2xl flex items-center justify-center hover:bg-cyan-500 active:scale-90 transition-all disabled:opacity-30 shadow-lg shadow-cyan-600/30"
                    >
                        <i class="ph-bold ph-paper-plane-right text-3xl"></i>
                    </button>
                </div>
            </div>
        </section>

        <!-- Footer -->
        <footer class="py-20 text-center opacity-30 text-[9px] font-bold uppercase tracking-[0.8em]">
            Autonomous System &bull; Zero Log Policy &bull; RUXX Enterprise
        </footer>

        <!-- Toast -->
        <transition name="toast">
            <div v-if="toast.show" class="fixed top-12 left-0 right-0 z-[100] flex justify-center px-6">
                <div class="bg-white text-black px-10 py-6 rounded-[2.5rem] shadow-[0_40px_80px_rgba(0,0,0,1)] flex items-center gap-5">
                    <div class="w-12 h-12 bg-black rounded-full flex items-center justify-center text-white shadow-xl">
                        <i class="ph-fill ph-check-circle text-2xl"></i>
                    </div>
                    <div class="flex flex-col">
                        <span class="text-[10px] font-black uppercase text-slate-400 tracking-widest leading-none">Terminal</span>
                        <span class="text-sm font-black uppercase tracking-tight mt-1">{{ toast.msg }}</span>
                    </div>
                </div>
            </div>
        </transition>

    </div>

    <script>
        const { createApp, ref, onMounted, nextTick } = Vue;

        createApp({
            setup() {
                const config = ref({
                    danaNumber: "089520729875",
                    danaName: "NO NAME",
                    qrisUrl: "https://raw.githubusercontent.com/IkyyExecutive/IkyyBokep/main/uploads/1771681562879_6307_1771681562312_file_452.jpg"
                });

                const toast = ref({ show: false, msg: '' });
                const chatContainer = ref(null);
                
                const chat = ref({
                    userInput: '',
                    isTyping: false,
                    messages: [
                        { role: 'assistant', text: 'Terminal Singularity Terhubung. Saya adalah asisten AI pusat RUXX PAY. Ada yang bisa saya bantu terkait transaksi luar angkasa Anda hari ini?' }
                    ]
                });

                // THREE.JS SINGULARITY ENGINE
                const initSpace = () => {
                    const scene = new THREE.Scene();
                    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
                    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                    renderer.setSize(window.innerWidth, window.innerHeight);
                    document.getElementById('canvas-container').appendChild(renderer.domElement);

                    // Stars
                    const geometry = new THREE.BufferGeometry();
                    const vertices = [];
                    for (let i = 0; i < 10000; i++) {
                        vertices.push(
                            THREE.MathUtils.randFloatSpread(2000), 
                            THREE.MathUtils.randFloatSpread(2000), 
                            THREE.MathUtils.randFloatSpread(2000)
                        );
                    }
                    geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
                    const material = new THREE.PointsMaterial({ 
                        color: 0xffffff, 
                        size: 1.5, 
                        transparent: true, 
                        opacity: 0.6,
                        blending: THREE.AdditiveBlending
                    });
                    const stars = new THREE.Points(geometry, material);
                    scene.add(stars);

                    camera.position.z = 1;

                    let targetX = 0, targetY = 0;
                    document.addEventListener('mousemove', (e) => {
                        targetX = (e.clientX - window.innerWidth / 2) * 0.0002;
                        targetY = (e.clientY - window.innerHeight / 2) * 0.0002;
                    });

                    const animate = () => {
                        requestAnimationFrame(animate);
                        stars.rotation.x += 0.0003;
                        stars.rotation.y += 0.0005;
                        camera.rotation.y += (targetX - camera.rotation.y) * 0.05;
                        camera.rotation.x += (targetY - camera.rotation.x) * 0.05;
                        renderer.render(scene, camera);
                    };
                    animate();

                    window.addEventListener('resize', () => {
                        camera.aspect = window.innerWidth / window.innerHeight;
                        camera.updateProjectionMatrix();
                        renderer.setSize(window.innerWidth, window.innerHeight);
                    });
                };

                const showToast = (msg) => {
                    toast.value.msg = msg;
                    toast.value.show = true;
                    setTimeout(() => toast.value.show = false, 3000);
                };

                const copy = (txt) => {
                    const el = document.createElement('textarea');
                    el.value = txt; 
                    document.body.appendChild(el);
                    el.select(); 
                    document.execCommand('copy');
                    document.body.removeChild(el);
                    showToast("Protokol Salin Selesai");
                };

                const downloadQR = () => {
                    const a = document.createElement('a');
                    a.href = config.value.qrisUrl;
                    a.download = 'RUXX-SINGULARITY-QR.jpg';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    showToast("Aset Berhasil Diunduh");
                };

                const scrollToBottom = async () => {
                    await nextTick();
                    if (chatContainer.value) {
                        chatContainer.value.scrollTop = chatContainer.value.scrollHeight;
                    }
                };

                // AI SYSTEM WITH STRICT EXPONENTIAL BACKOFF
                const apiKey = "AIzaSyDnEVtoDpknDlUFkw4pPpe_lh0_z0YZ4As"; // Disuntikkan otomatis oleh runtime
                const callGemini = async (prompt) => {
                    const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                    
                    const systemPrompt = `Anda adalah RUXX Singularity AI. 
                    Konteks Bisnis: 'RUXX PAY' Gateway. Pembayaran via DANA ${config.value.danaNumber} (a/n ${config.value.danaName}) dan QRIS All Payment. 
                    Persona: Sangat cerdas, futuristik, tenang, dan sangat membantu. Gunakan terminologi luar angkasa/teknologi tingkat lanjut. Jawab singkat.`;

                    const payload = {
                        contents: [{ parts: [{ text: prompt }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] }
                    };

                    const delays = [1000, 2000, 4000, 8000, 16000];
                    for (let i = 0; i <= delays.length; i++) {
                        try {
                            const res = await fetch(endpoint, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify(payload)
                            });
                            
                            if (!res.ok) throw new Error("Terminal Busy");
                            
                            const result = await res.json();
                            const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                            
                            if (!text) throw new Error("Empty Frequency");
                            return text;
                        } catch (e) {
                            if (i === delays.length) return "Maaf Komandan, sinyal neural terputus total. Hubungi admin secara manual.";
                            await new Promise(r => setTimeout(r, delays[i]));
                        }
                    }
                };

                const sendMessage = async () => {
                    if (!chat.value.userInput || chat.value.isTyping) return;
                    
                    const userText = chat.value.userInput;
                    chat.value.messages.push({ role: 'user', text: userText });
                    chat.value.userInput = '';
                    chat.value.isTyping = true;
                    await scrollToBottom();

                    try {
                        const response = await callGemini(userText);
                        chat.value.messages.push({ role: 'assistant', text: response });
                    } catch (e) {
                        chat.value.messages.push({ role: 'assistant', text: "Terjadi anomali pada protokol chat." });
                    } finally {
                        chat.value.isTyping = false;
                        await scrollToBottom();
                    }
                };

                onMounted(() => {
                    initSpace();
                });

                return { config, toast, chat, chatContainer, copy, downloadQR, sendMessage };
            }
        }).mount('#app');
    </script>

    <style>
        /* Toast Animation Elite */
        .toast-enter-active { animation: toastIn 0.8s cubic-bezier(0.19, 1, 0.22, 1); }
        .toast-leave-active { animation: toastIn 0.4s reverse ease-in; }
        
        @keyframes toastIn {
            0% { transform: translateY(-150%) scale(0.9); opacity: 0; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }
    </style>
</body>
</html>
