<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RUXXPAY - Aether-Prime Edition</title>
    <!-- Core Stack -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Space+Grotesk:wght@300;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        [v-cloak] { display: none; }
        :root {
            --primary-cyan: #22d3ee;
            --primary-indigo: #6366f1;
            --glass-bg: rgba(8, 10, 24, 0.75);
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #000;
            color: #f8fafc;
            overflow-x: hidden;
            margin: 0;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        /* High-Performance Canvas */
        #canvas-aether {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #0c0e25 0%, #000000 100%);
        }

        /* Glassmorphism Aether Edition */
        .glass-aether {
            background: var(--glass-bg);
            backdrop-filter: blur(45px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.9);
            position: relative;
            overflow: hidden;
        }

        .glass-aether::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(125deg, transparent 40%, rgba(255,255,255,0.05) 50%, transparent 60%);
            transform: translateX(-100%);
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-aether:hover::after {
            transform: translateX(100%);
        }

        /* Brand Typography - Anti Cut-Off */
        .brand-aether {
            font-size: clamp(2rem, 12.5vw, 6rem);
            line-height: 0.85;
            font-weight: 900;
            letter-spacing: -0.06em;
            background: linear-gradient(to bottom, #ffffff 40%, #64748b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.5));
        }

        /* Custom Shimmer Loading */
        .shimmer-active {
            position: relative;
        }
        .shimmer-active::before {
            content: '';
            position: absolute;
            top: 0; left: -150%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(99,102,241,0.1), transparent);
            animation: shimmer-prime 3s infinite;
        }
        @keyframes shimmer-prime {
            100% { left: 150%; }
        }

        .video-aether {
            box-shadow: 0 0 60px rgba(99, 102, 241, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        /* Custom Scrollbar Elite */
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: var(--primary-indigo); border-radius: 20px; }

        .btn-elite {
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .btn-elite:active { transform: scale(0.94); filter: brightness(1.1); }
    </style>
</head>
<body class="selection:bg-indigo-500/30">

    <div id="canvas-aether"></div>

    <div id="app" v-cloak class="max-w-xl mx-auto min-h-screen p-5 sm:p-8 pb-32 flex flex-col relative z-10">
        
        <!-- Header: Aether Center -->
        <header class="py-10 sm:py-16 text-center animate-in fade-in duration-1000 flex flex-col items-center">
            <div class="inline-flex items-center gap-3 px-5 py-2 rounded-full bg-slate-900/90 border border-slate-700/50 mb-10 shadow-2xl backdrop-blur-md">
                <span class="relative flex h-2.5 w-2.5">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-indigo-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-indigo-500"></span>
                </span>
                <span class="text-[10px] font-black uppercase tracking-[0.4em] text-slate-300">Protokol Keamanan A-1</span>
            </div>
            
            <h1 class="brand-aether italic uppercase mb-10" style="font-family: 'Space Grotesk', sans-serif;">
                RUXX<span class="text-indigo-500">PAY</span>
            </h1>

            <!-- Animation Center: Master View -->
            <div class="mb-10 w-full flex justify-center px-2">
                <div class="video-aether relative rounded-[3rem] overflow-hidden aspect-video w-full max-w-[440px] bg-black">
                    <video autoplay loop muted playsinline class="w-full h-full object-cover">
                        <source src="https://raw.githubusercontent.com/IkyyExecutive/IkyyBokep/main/uploads/1771800742244_68558_1771800741335_file_652.mp4" type="video/mp4">
                    </video>
                    <!-- Holographic Scan Overlay -->
                    <div class="absolute inset-0 pointer-events-none bg-gradient-to-b from-indigo-500/10 via-transparent to-transparent opacity-30"></div>
                    <div class="absolute inset-0 pointer-events-none ring-1 ring-inset ring-white/20 rounded-[3rem]"></div>
                </div>
            </div>

            <p class="text-[11px] font-bold text-slate-500 uppercase tracking-[1.5em] mb-4">Prime Financial Node</p>
        </header>

        <!-- Main Components -->
        <div class="space-y-12">
            
            <!-- Module 01: Advanced QRIS -->
            <section class="space-y-5 animate-in slide-in-from-bottom duration-1000">
                <div class="flex items-center justify-between px-6">
                    <div class="flex items-center gap-3">
                        <i class="ph-fill ph-qr-code text-indigo-400 text-2xl"></i>
                        <h2 class="text-xs font-black uppercase tracking-widest text-slate-400 italic">Antarmuka QRIS</h2>
                    </div>
                    <span class="text-[8px] font-bold text-slate-600 uppercase border border-slate-800 px-2 py-0.5 rounded">v2.0</span>
                </div>
                
                <div class="glass-aether rounded-[3.5rem] p-10 flex flex-col items-center space-y-10 shimmer-active">
                    <div class="relative bg-white p-6 rounded-[2.5rem] shadow-[0_0_80px_rgba(99,102,241,0.2)] group transition-all duration-700 hover:rotate-3">
                        <img :src="config.qrisUrl" alt="RUXXPAY QRIS" class="w-56 h-56 sm:w-64 sm:h-64 object-contain rounded-xl">
                        <!-- Dynamic Corner Accents -->
                        <div class="absolute -top-2 -left-2 w-8 h-8 border-t-4 border-l-4 border-indigo-600 rounded-tl-xl"></div>
                        <div class="absolute -bottom-2 -right-2 w-8 h-8 border-b-4 border-r-4 border-indigo-600 rounded-br-xl"></div>
                    </div>
                    
                    <div class="w-full space-y-5">
                        <button @click="downloadQR" class="btn-elite w-full py-5 bg-white text-slate-950 rounded-2xl font-black text-xs uppercase tracking-widest flex items-center justify-center gap-3 shadow-2xl">
                            <i class="ph-bold ph-download-simple text-xl text-indigo-600"></i>
                            Unduh Kode QRIS
                        </button>
                        <p class="text-[9px] text-center text-slate-500 italic uppercase tracking-[0.3em] font-medium">Auto-Detection Enabled</p>
                    </div>
                </div>
            </section>

            <!-- Module 02: DANA Elite Node -->
            <section class="space-y-5 animate-in slide-in-from-bottom duration-1000 delay-150">
                <div class="flex items-center justify-between px-6">
                    <div class="flex items-center gap-3">
                        <i class="ph-fill ph-wallet text-indigo-400 text-2xl"></i>
                        <h2 class="text-xs font-black uppercase tracking-widest text-slate-400 italic">Protokol DANA</h2>
                    </div>
                </div>

                <div class="glass-aether rounded-[3.5rem] p-10 flex flex-col justify-center space-y-10 shimmer-active">
                    <div class="space-y-7 relative z-10 text-left">
                        <div class="border-l-2 border-indigo-500 pl-5">
                            <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-3">Tujuan Pengiriman</p>
                            <h3 class="text-4xl sm:text-5xl font-black tracking-tight text-white break-all leading-none" style="font-family: 'Space Grotesk', sans-serif;">
                                {{ config.danaNumber }}
                            </h3>
                        </div>
                        
                        <div class="flex items-center gap-4 py-5 px-7 rounded-[2rem] bg-indigo-500/10 border border-indigo-500/20 shadow-inner group">
                            <div class="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center text-white shadow-lg transition-transform group-hover:scale-110">
                                <i class="ph-fill ph-user-circle text-3xl"></i>
                            </div>
                            <div class="min-w-0">
                                <p class="text-[9px] font-bold text-indigo-400 uppercase tracking-widest">Penerima Resmi</p>
                                <p class="text-sm font-black uppercase text-slate-100 truncate tracking-tighter">{{ config.danaName }}</p>
                            </div>
                        </div>
                    </div>

                    <button @click="copy(config.danaNumber)" class="btn-elite w-full py-5 bg-gradient-to-br from-indigo-600 to-indigo-900 text-white rounded-2xl font-black text-xs uppercase tracking-widest flex items-center justify-center gap-3 shadow-2xl shadow-indigo-900/50 relative z-10">
                        <i :class="copyIcon" class="text-xl transition-all"></i>
                        {{ copyText }}
                    </button>
                </div>
            </section>

            <!-- Guide: Tactical Info -->
            <section class="space-y-5 animate-in slide-in-from-bottom duration-1000 delay-300">
                <div class="flex items-center gap-3 px-6">
                    <i class="ph-fill ph-info text-emerald-400 text-xl"></i>
                    <h2 class="text-xs font-black uppercase tracking-widest text-slate-400 italic">Panduan Langkah</h2>
                </div>

                <div class="glass-aether rounded-[3rem] p-10 space-y-8">
                    <div class="space-y-6">
                        <div v-for="(step, i) in steps" :key="i" class="flex gap-6 items-start group">
                            <div class="w-8 h-8 flex-shrink-0 bg-slate-800 rounded-xl flex items-center justify-center text-[10px] font-black text-slate-400 border border-slate-700 transition-all group-hover:border-indigo-500 group-hover:text-indigo-400">0{{i+1}}</div>
                            <p class="text-xs font-medium text-slate-300 leading-relaxed pt-1" v-html="step"></p>
                        </div>
                    </div>
                </div>
            </section>
        </div>

        <!-- Footer: Branding -->
        <footer class="py-24 text-center space-y-10 opacity-30">
            <div class="flex justify-center gap-12 text-slate-400">
                <i class="ph-bold ph-shield-check text-4xl"></i>
                <i class="ph-bold ph-lightning text-4xl"></i>
                <i class="ph-bold ph-fingerprint text-4xl"></i>
            </div>
            <p class="text-[9px] font-black uppercase tracking-[2em] text-slate-500 leading-loose">RUXX CORP &bull; AES-256 BIT ENCRYPTED</p>
        </footer>

        <!-- Toast: Aether Notification -->
        <transition name="toast-prime">
            <div v-if="toast.show" class="fixed bottom-12 left-0 right-0 z-[100] flex justify-center px-6">
                <div class="bg-white text-slate-950 px-10 py-5 rounded-full shadow-[0_40px_120px_rgba(0,0,0,1)] flex items-center gap-6 border-[3px] border-indigo-600">
                    <div class="w-12 h-12 bg-indigo-600 rounded-full flex items-center justify-center text-white shadow-xl rotate-12">
                        <i class="ph-fill ph-check-circle text-2xl"></i>
                    </div>
                    <div class="flex flex-col text-left">
                        <span class="text-[10px] font-black uppercase text-indigo-500 tracking-widest leading-none">Sistem Sukses</span>
                        <span class="text-xs font-black uppercase tracking-tight mt-1">{{ toast.msg }}</span>
                    </div>
                </div>
            </div>
        </transition>

    </div>

    <script>
        const { createApp, ref, onMounted } = Vue;

        createApp({
            setup() {
                const config = ref({
                    danaNumber: "089520729875",
                    danaName: "NO NAME",
                    qrisUrl: "https://raw.githubusercontent.com/IkyyExecutive/IkyyBokep/main/uploads/1771681562879_6307_1771681562312_file_452.jpg"
                });

                const toast = ref({ show: false, msg: '' });
                const copyText = ref('Salin Nomor DANA');
                const copyIcon = ref('ph-bold ph-copy');
                
                const steps = [
                    'Selesaikan transaksi via pemindaian <b>QRIS</b> untuk verifikasi instan.',
                    'Gunakan <b>Transfer DANA</b> ke rekening resmi di atas jika diperlukan.',
                    'Simpan <b>Bukti Transaksi</b> Anda untuk proses validasi oleh sistem pusat.'
                ];

                // ENGINE THREE.JS: AETHER-CORE NEBULA
                const initAether = () => {
                    const scene = new THREE.Scene();
                    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1500);
                    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                    renderer.setSize(window.innerWidth, window.innerHeight);
                    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                    document.getElementById('canvas-aether').appendChild(renderer.domElement);

                    const createCloud = (count, color, size, radius) => {
                        const geometry = new THREE.BufferGeometry();
                        const positions = [];
                        for (let i = 0; i < count; i++) {
                            const r = radius * Math.sqrt(Math.random());
                            const theta = Math.random() * 2 * Math.PI;
                            const phi = Math.random() * Math.PI;
                            positions.push(r * Math.sin(phi) * Math.cos(theta), r * Math.sin(phi) * Math.sin(theta), r * Math.cos(phi));
                        }
                        geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
                        return new THREE.Points(geometry, new THREE.PointsMaterial({
                            color: color,
                            size: size,
                            transparent: true,
                            opacity: 0.4,
                            blending: THREE.AdditiveBlending,
                            depthWrite: false
                        }));
                    };

                    const nebulaCore = createCloud(2500, 0x6366f1, 1.5, 800);
                    const nebulaEdge = createCloud(2000, 0x22d3ee, 1.2, 1000);
                    const stars = createCloud(4000, 0xffffff, 0.6, 1400);
                    
                    scene.add(nebulaCore, nebulaEdge, stars);
                    camera.position.z = 1;

                    let mouseX = 0, mouseY = 0;
                    const handleMove = (e) => {
                        const x = e.touches ? e.touches[0].clientX : e.clientX;
                        const y = e.touches ? e.touches[0].clientY : e.clientY;
                        mouseX = (x - window.innerWidth / 2) * 0.0002;
                        mouseY = (y - window.innerHeight / 2) * 0.0002;
                    };

                    document.addEventListener('mousemove', handleMove);
                    document.addEventListener('touchmove', handleMove, { passive: true });

                    const animate = () => {
                        requestAnimationFrame(animate);
                        nebulaCore.rotation.y += 0.0006;
                        nebulaEdge.rotation.x += 0.0004;
                        stars.rotation.z += 0.0002;
                        
                        camera.rotation.y += (mouseX - camera.rotation.y) * 0.05;
                        camera.rotation.x += (mouseY - camera.rotation.x) * 0.05;
                        renderer.render(scene, camera);
                    };
                    animate();

                    window.addEventListener('resize', () => {
                        camera.aspect = window.innerWidth / window.innerHeight;
                        camera.updateProjectionMatrix();
                        renderer.setSize(window.innerWidth, window.innerHeight);
                    });
                };

                const showToast = (msg) => {
                    toast.value.msg = msg;
                    toast.value.show = true;
                    setTimeout(() => toast.value.show = false, 3000);
                };

                const copy = (txt) => {
                    const el = document.createElement('textarea');
                    el.value = txt; document.body.appendChild(el);
                    el.select(); 
                    try {
                        document.execCommand('copy');
                        copyText.value = 'Tersalin Ke Clipboard!';
                        copyIcon.value = 'ph-bold ph-check';
                        showToast("Nomor Berhasil Disalin");
                        setTimeout(() => {
                            copyText.value = 'Salin Nomor DANA';
                            copyIcon.value = 'ph-bold ph-copy';
                        }, 2500);
                    } catch (e) {
                        showToast("Gagal menyalin");
                    }
                    document.body.removeChild(el);
                };

                const downloadQR = async () => {
                    showToast("Menyiapkan Unduhan...");
                    try {
                        const res = await fetch(config.value.qrisUrl);
                        const blob = await res.blob();
                        const url = window.URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = 'RUXXPAY-QRIS-OFFICIAL.jpg';
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                        window.URL.revokeObjectURL(url);
                        showToast("Kode QR Berhasil Disimpan");
                    } catch (e) {
                        window.open(config.value.qrisUrl, '_blank');
                        showToast("Membuka Gambar...");
                    }
                };

                onMounted(() => {
                    initAether();
                });

                return { config, toast, steps, copyText, copyIcon, copy, downloadQR };
            }
        }).mount('#app');
    </script>

    <style>
        /* Prime Notification Animation */
        .toast-prime-enter-active { animation: prime-in 0.8s cubic-bezier(0.19, 1, 0.22, 1); }
        .toast-prime-leave-active { animation: prime-in 0.5s reverse ease-in; }
        @keyframes prime-in {
            0% { transform: translateY(200%) scale(0.8) rotate(10deg); opacity: 0; }
            100% { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; }
        }
    </style>
</body>
</html>
