<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUXX PAY - Supernova AI</title>
    <!-- Core Stack -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        [v-cloak] { display: none; }
        :root {
            --neon-blue: #60a5fa;
            --neon-purple: #a855f7;
            --neon-rose: #fb7185;
        }

        body { 
            font-family: 'Space Grotesk', sans-serif; 
            background-color: #000;
            color: white;
            overflow-x: hidden;
            margin: 0;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        /* Glassmorphism Ultra */
        .glass-vault {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
        }

        .neon-border {
            position: relative;
            overflow: hidden;
        }
        
        .neon-border::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(transparent, var(--neon-blue), transparent, var(--neon-purple), transparent);
            animation: rotate-border 6s linear infinite;
            z-index: -1;
        }

        @keyframes rotate-border {
            100% { transform: rotate(360deg); }
        }

        .content-inner {
            background: #050505;
            margin: 2px;
            border-radius: inherit;
        }

        /* AI Chat Bubble Customization */
        .chat-scroll::-webkit-scrollbar { width: 4px; }
        .chat-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        .ai-msg {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.8) 0%, rgba(15, 23, 42, 0.8) 100%);
            border-left: 3px solid var(--neon-blue);
        }

        .user-msg {
            background: linear-gradient(135deg, var(--neon-purple) 0%, #6366f1 100%);
            box-shadow: 0 10px 20px -10px var(--neon-purple);
        }
    </style>
</head>
<body class="selection:bg-indigo-500/30">

    <div id="canvas-container"></div>

    <div id="app" v-cloak class="max-w-4xl mx-auto min-h-screen p-6 pb-24 flex flex-col relative z-10">
        
        <!-- Animated Header -->
        <header class="py-16 text-center animate-in fade-in zoom-in duration-1000">
            <div class="relative inline-block mb-6">
                <div class="absolute inset-0 bg-blue-500 blur-[60px] opacity-20 animate-pulse"></div>
                <h1 class="text-7xl font-black italic tracking-tighter uppercase leading-none bg-clip-text text-transparent bg-gradient-to-b from-white via-slate-300 to-slate-600">
                    RUXX<span class="text-blue-400">PAY</span>
                </h1>
            </div>
            <p class="text-[10px] font-bold text-blue-300 uppercase tracking-[1em] opacity-60">Quantum Encryption Layer</p>
        </header>

        <!-- Main Display Cards -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-10 mb-20">
            
            <!-- QRIS CARD -->
            <section class="space-y-6 animate-in fade-in slide-in-from-left duration-1000">
                <div class="flex items-center gap-3 px-4">
                    <i class="ph-fill ph-qr-code text-rose-400 text-2xl"></i>
                    <h2 class="text-xs font-black uppercase tracking-widest text-slate-400">QRIS Uplink</h2>
                </div>
                
                <div class="neon-border rounded-[3.5rem] p-0 shadow-2xl">
                    <div class="content-inner p-10 text-center space-y-8 rounded-[3.5rem]">
                        <div class="relative inline-block bg-white p-4 rounded-3xl group cursor-pointer overflow-hidden">
                            <div class="absolute inset-0 bg-black opacity-0 group-hover:opacity-10 transition-opacity"></div>
                            <img :src="config.qrisUrl" alt="QRIS" class="w-64 h-64 object-contain rounded-xl transition-transform duration-700 group-hover:scale-110">
                        </div>
                        <button @click="downloadQR" class="w-full py-5 bg-white text-black rounded-2xl font-black text-[10px] uppercase tracking-[0.3em] flex items-center justify-center gap-3 hover:bg-slate-200 transition-all active:scale-95">
                            <i class="ph-bold ph-download-simple text-xl"></i>
                            Download QR Asset
                        </button>
                    </div>
                </div>
            </section>

            <!-- DANA CARD -->
            <section class="space-y-6 animate-in fade-in slide-in-from-right duration-1000">
                <div class="flex items-center gap-3 px-4">
                    <i class="ph-fill ph-wallet text-blue-400 text-2xl"></i>
                    <h2 class="text-xs font-black uppercase tracking-widest text-slate-400">DANA Node</h2>
                </div>

                <div class="neon-border rounded-[3.5rem] p-0 shadow-2xl">
                    <div class="content-inner p-10 space-y-12 rounded-[3.5rem] relative overflow-hidden">
                        <div class="space-y-2 relative z-10 text-left">
                            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Target Address</p>
                            <h3 class="text-4xl font-black tracking-widest text-blue-400 leading-none">
                                {{ config.danaNumber }}
                            </h3>
                            <div class="pt-4">
                                <span class="bg-blue-500/10 text-blue-400 border border-blue-500/20 px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-[0.2em]">
                                    A/N {{ config.danaName }}
                                </span>
                            </div>
                        </div>

                        <button @click="copy(config.danaNumber)" class="w-full py-5 bg-blue-600 text-white rounded-2xl font-black text-[10px] uppercase tracking-[0.3em] flex items-center justify-center gap-3 hover:bg-blue-500 transition-all active:scale-95 shadow-lg shadow-blue-600/30">
                            <i class="ph-bold ph-copy-simple text-xl"></i>
                            Copy Endpoint
                        </button>
                    </div>
                </div>
            </section>
        </div>

        <!-- AI COMMAND CENTER (DIPERBAIKI) -->
        <section class="flex-1 flex flex-col space-y-6 animate-in fade-in slide-in-from-bottom duration-1000 delay-300">
            <div class="flex items-center justify-between px-6">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-[0_0_20px_rgba(79,70,229,0.5)]">
                        <i class="ph-fill ph-robot text-2xl"></i>
                    </div>
                    <div>
                        <h2 class="text-sm font-black uppercase tracking-widest leading-none">RUXX Core AI</h2>
                        <span class="text-[9px] font-bold text-green-500 uppercase tracking-widest flex items-center gap-1 mt-1">
                            <span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span>
                            Neural Link Active
                        </span>
                    </div>
                </div>
            </div>

            <div class="glass-vault rounded-[3rem] flex-1 flex flex-col overflow-hidden min-h-[500px] border-white/5">
                <!-- Chat View -->
                <div ref="chatContainer" class="flex-1 overflow-y-auto p-8 space-y-6 chat-scroll">
                    <div v-for="(msg, i) in chat.messages" :key="i" 
                        :class="msg.role === 'user' ? 'flex flex-row-reverse' : 'flex flex-row'"
                        class="animate-in fade-in slide-in-from-bottom-2 duration-300"
                    >
                        <div :class="msg.role === 'user' ? 'user-msg rounded-tr-none' : 'ai-msg rounded-tl-none text-slate-100'" 
                             class="max-w-[85%] px-6 py-4 rounded-[1.5rem] shadow-xl">
                            <p class="text-sm font-medium leading-relaxed tracking-wide italic">{{ msg.text }}</p>
                        </div>
                    </div>
                    <!-- Typing Indicator -->
                    <div v-if="chat.isTyping" class="flex flex-row">
                        <div class="ai-msg px-6 py-4 rounded-[1.5rem] rounded-tl-none flex items-center gap-2">
                            <div class="w-2 h-2 bg-blue-400 rounded-full animate-bounce" style="animation-delay: 0s"></div>
                            <div class="w-2 h-2 bg-blue-400 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
                            <div class="w-2 h-2 bg-blue-400 rounded-full animate-bounce" style="animation-delay: 0.4s"></div>
                        </div>
                    </div>
                </div>

                <!-- Input Panel -->
                <div class="p-6 bg-black/40 border-t border-white/5 flex gap-4">
                    <input 
                        v-model="chat.userInput" 
                        @keyup.enter="sendMessage"
                        type="text" 
                        placeholder="Masukkan perintah atau pertanyaan..." 
                        class="flex-1 bg-white/5 border border-white/10 rounded-2xl px-6 py-4 text-xs font-medium outline-none focus:border-blue-500 focus:bg-white/10 transition-all placeholder:text-slate-600"
                    >
                    <button 
                        @click="sendMessage" 
                        :disabled="!chat.userInput || chat.isTyping"
                        class="w-14 h-14 bg-indigo-600 text-white rounded-2xl flex items-center justify-center hover:bg-indigo-500 active:scale-90 transition-all disabled:opacity-30 shadow-lg shadow-indigo-600/20"
                    >
                        <i class="ph-bold ph-paper-plane-right text-2xl"></i>
                    </button>
                </div>
            </div>
        </section>

        <!-- Toast -->
        <transition name="toast">
            <div v-if="toast.show" class="fixed top-10 left-0 right-0 z-[100] flex justify-center px-6">
                <div class="bg-white text-black px-8 py-5 rounded-[2rem] shadow-2xl flex items-center gap-4">
                    <div class="w-10 h-10 bg-black rounded-full flex items-center justify-center text-white">
                        <i class="ph-fill ph-check-circle text-2xl"></i>
                    </div>
                    <div class="flex flex-col">
                        <span class="text-[10px] font-black uppercase text-slate-400 tracking-widest">Sistem</span>
                        <span class="text-[12px] font-black uppercase tracking-tight">{{ toast.msg }}</span>
                    </div>
                </div>
            </div>
        </transition>

    </div>

    <script>
        const { createApp, ref, onMounted, nextTick } = Vue;

        createApp({
            setup() {
                const config = ref({
                    danaNumber: "089520729875",
                    danaName: "NO NAME",
                    qrisUrl: "https://raw.githubusercontent.com/IkyyExecutive/IkyyBokep/main/uploads/1771681562879_6307_1771681562312_file_452.jpg"
                });

                const toast = ref({ show: false, msg: '' });
                const chatContainer = ref(null);
                
                const chat = ref({
                    userInput: '',
                    isTyping: false,
                    messages: [
                        { role: 'assistant', text: 'Sistem Pusat RUXX PAY Aktif. Bagaimana saya dapat memandu transaksi Anda hari ini, Komandan?' }
                    ]
                });

                // THREE.JS SPACE ENGINE
                const initSpace = () => {
                    const scene = new THREE.Scene();
                    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                    renderer.setSize(window.innerWidth, window.innerHeight);
                    document.getElementById('canvas-container').appendChild(renderer.domElement);

                    const geometry = new THREE.BufferGeometry();
                    const vertices = [];
                    for (let i = 0; i < 5000; i++) {
                        vertices.push(THREE.MathUtils.randFloatSpread(2000), THREE.MathUtils.randFloatSpread(2000), THREE.MathUtils.randFloatSpread(2000));
                    }
                    geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
                    const material = new THREE.PointsMaterial({ color: 0xffffff, size: 2, transparent: true, opacity: 0.8 });
                    const stars = new THREE.Points(geometry, material);
                    scene.add(stars);

                    camera.position.z = 1;

                    let mouseX = 0, mouseY = 0;
                    document.addEventListener('mousemove', (e) => {
                        mouseX = (e.clientX - window.innerWidth / 2) * 0.05;
                        mouseY = (e.clientY - window.innerHeight / 2) * 0.05;
                    });

                    const animate = () => {
                        requestAnimationFrame(animate);
                        stars.rotation.x += 0.0005;
                        stars.rotation.y += 0.0005;
                        camera.position.x += (mouseX - camera.position.x) * 0.05;
                        camera.position.y += (-mouseY - camera.position.y) * 0.05;
                        renderer.render(scene, camera);
                    };
                    animate();

                    window.addEventListener('resize', () => {
                        camera.aspect = window.innerWidth / window.innerHeight;
                        camera.updateProjectionMatrix();
                        renderer.setSize(window.innerWidth, window.innerHeight);
                    });
                };

                const showToast = (msg) => {
                    toast.value.msg = msg;
                    toast.value.show = true;
                    setTimeout(() => toast.value.show = false, 3000);
                };

                const copy = (txt) => {
                    const el = document.createElement('textarea');
                    el.value = txt; document.body.appendChild(el);
                    el.select(); document.execCommand('copy');
                    document.body.removeChild(el);
                    showToast("Saluran Salin Berhasil");
                };

                const downloadQR = () => {
                    const a = document.createElement('a');
                    a.href = config.value.qrisUrl;
                    a.download = 'RUXX-QRIS-NODE.jpg';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    showToast("Aset Berhasil Diunduh");
                };

                const scrollToBottom = async () => {
                    await nextTick();
                    if (chatContainer.value) {
                        chatContainer.value.scrollTop = chatContainer.value.scrollHeight;
                    }
                };

                // GEMINI INTEGRATION WITH BACKOFF
                const apiKey = "AIzaSyDnEVtoDpknDlUFkw4pPpe_lh0_z0YZ4As"; 
                const callGemini = async (prompt) => {
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                    const systemPrompt = `Anda adalah RUXX Supernova AI. 
                    Detail: Gateway 'RUXX PAY', DANA ${config.value.danaNumber} a/n ${config.value.danaName}, QRIS All Payment. 
                    Karakter: Futuristik, cerdas, efisien. Gunakan istilah seperti 'Uplink', 'Node', 'Protokol Enkripsi'. Jawab singkat dan padat.`;

                    const delays = [1000, 2000, 4000, 8000, 16000];
                    const payload = {
                        contents: [{ parts: [{ text: prompt }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] }
                    };

                    for (let i = 0; i <= delays.length; i++) {
                        try {
                            const res = await fetch(url, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify(payload)
                            });
                            if (!res.ok) throw new Error("API Error");
                            const result = await res.json();
                            return result.candidates?.[0]?.content?.parts?.[0]?.text || "Sinkronisasi gagal.";
                        } catch (e) {
                            if (i === delays.length) return "Koneksi Neural Terputus. Silakan coba lagi nanti.";
                            await new Promise(r => setTimeout(r, delays[i]));
                        }
                    }
                };

                const sendMessage = async () => {
                    if (!chat.value.userInput || chat.value.isTyping) return;
                    
                    const userText = chat.value.userInput;
                    chat.value.messages.push({ role: 'user', text: userText });
                    chat.value.userInput = '';
                    chat.value.isTyping = true;
                    await scrollToBottom();

                    try {
                        const response = await callGemini(userText);
                        chat.value.messages.push({ role: 'assistant', text: response });
                    } catch (e) {
                        chat.value.messages.push({ role: 'assistant', text: "Terjadi gangguan pada protokol AI." });
                    } finally {
                        chat.value.isTyping = false;
                        await scrollToBottom();
                    }
                };

                onMounted(() => {
                    window.onload = initSpace;
                });

                return { config, toast, chat, chatContainer, copy, downloadQR, sendMessage };
            }
        }).mount('#app');
    </script>

    <style>
        /* Toast Animation */
        .toast-enter-active { animation: toastSlideIn 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        .toast-leave-active { animation: toastSlideIn 0.4s reverse ease-in; }
        
        @keyframes toastSlideIn {
            0% { transform: translateY(-100px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
    </style>
</body>
</html>
